<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Jhony</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Iconos -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container d-flex justify-content-center align-items-center vh-100">
    
    <div class="card card-custom text-center p-4">

      <!-- Foto de perfil -->
      <img src="imagen/foto_oficina.jpeg" class="profile-img" alt="Foto Jhony">

      <div class="card-body">
        <h4 class="card-title mt-3">Jhony David Moreno</h4>
        <p class="role">Full Stack Developer</p>

        <p class="description">
          Apasionado por el desarrollo web, aplicando tecnologias como
          JavaScript|Python|Html|Css
        </p>

        <!-- Botones -->
        <div class="social-btns mt-3">

          <a href="https://github.com/JhonyDMoreno" target="_blank" class="btn btn-dark">
            <i class="bi bi-github"></i>
          </a>

          <a href="https://www.linkedin.com/in/jony-david-moreno-29753b313/" target="_blank" class="btn btn-primary">
            <i class="bi bi-linkedin"></i>
          </a>

          <a href="mailto:jhonydavidmoreno@gmail.com" class="btn btn-danger">
            <i class="bi bi-envelope-fill"></i>
          </a>

        </div>
      </div>

    </div>

  </div>

</body>
</html>
